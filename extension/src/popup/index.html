<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Wordhook</title>
    <style>
      :root { color-scheme: dark; }
      [hidden] { display: none !important; }
      body {
        width: 300px;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #101014;
        color: #f4f4f5;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 10px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.01em;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        background: #818cf8;
        color: #101014;
        border-radius: 7px;
        font-size: 10px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #a1a1aa;
      }
      .dot { width: 7px; height: 7px; border-radius: 999px; background: #52525b; }
      .dot.paired { background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.7); }
      .dot.unpaired { background: #f87171; }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 4px 16px 12px;
      }
      .stat {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 12px;
        padding: 10px;
        text-align: center;
      }
      .stat .n { font-size: 20px; font-weight: 700; }
      .stat .l { font-size: 10px; color: #a1a1aa; margin-top: 2px; }
      .stat.due .n { color: #fbbf24; }

      .section {
        padding: 0 16px 12px;
      }
      .section h2 {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #71717a;
        margin: 0 0 6px;
      }
      .pos-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .pos-btn {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        color: #d4d4d8;
        border-radius: 9px;
        padding: 7px 0;
        font-size: 11px;
        cursor: pointer;
      }
      .pos-btn.active {
        background: rgba(129,140,248,0.2);
        border-color: #818cf8;
        color: #e0e7ff;
      }
      label.check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #d4d4d8;
        cursor: pointer;
      }
      .actions {
        display: flex;
        gap: 8px;
        padding: 2px 16px 16px;
      }
      .btn {
        flex: 1;
        display: block;
        text-align: center;
        text-decoration: none;
        background: #818cf8;
        color: #101014;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        padding: 9px 0;
        font-size: 12px;
        cursor: pointer;
      }
      .btn.secondary {
        background: rgba(255,255,255,0.06);
        color: #d4d4d8;
        border: 1px solid rgba(255,255,255,0.1);
        font-weight: 500;
      }
      .unpaired-help {
        margin: 0 16px 14px;
        padding: 10px;
        background: rgba(248,113,113,0.08);
        border: 1px solid rgba(248,113,113,0.25);
        border-radius: 10px;
        font-size: 11px;
        color: #fca5a5;
        line-height: 1.5;
      }
      .unpaired-help a { color: #f4f4f5; }
    </style>
  </head>
  <body>
    <div class="top">
      <span class="brand"><span class="logo">▶</span>Wordhook</span>
      <span class="status"><span id="status-dot" class="dot"></span><span id="status-text">…</span></span>
    </div>

    <div id="unpaired-help" class="unpaired-help" hidden>
      Extension non associée — <a id="connect-link" href="#" target="_blank" rel="noopener">génère un code sur le site</a>,
      puis colle-le dans les <a id="options-link-2" href="#">options</a>.
    </div>

    <div id="stats" class="stats" hidden>
      <div class="stat"><div class="n" id="stat-total">–</div><div class="l">mots dans ta banque</div></div>
      <div class="stat due"><div class="n" id="stat-due">–</div><div class="l">à réviser maintenant</div></div>
    </div>

    <div class="section">
      <h2>Position de l'overlay</h2>
      <div class="pos-grid">
        <button class="pos-btn" data-pos="top-left">↖ Haut gauche</button>
        <button class="pos-btn" data-pos="top-right">↗ Haut droite</button>
        <button class="pos-btn" data-pos="bottom-left">↙ Bas gauche</button>
        <button class="pos-btn" data-pos="bottom-right">↘ Bas droite</button>
      </div>
    </div>

    <div class="section">
      <label class="check">
        <input type="checkbox" id="pause-check" />
        Mettre en pause quand j'ouvre la fiche d'un mot
      </label>
    </div>

    <div class="actions">
      <a class="btn" id="review-link" href="#" target="_blank" rel="noopener">Réviser</a>
      <button class="btn secondary" id="options-btn">Options</button>
    </div>

    <script src="index.js"></script>
  </body>
</html>
